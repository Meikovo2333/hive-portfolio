// 生成路线函数
function generateRoute(days) {
    // 更新按钮状态
    document.querySelectorAll('.day-btn').forEach(btn => {
        btn.classList.remove('active');
        if(btn.textContent.includes(days + '天') || (days === 7 && btn.textContent.includes('7天+'))) {
            btn.classList.add('active');
        }
    });
    
    const route = routeDatabase[days];
    const container = document.getElementById('route-content');
    
    // 生成景点HTML
    let spotsHtml = '';
    route.spots.forEach(spot => {
        spotsHtml += `
            <div class="spot-card">
                <div class="spot-img">[${spot.name}]<<br>景点照片</div>
                <div class="spot-info">
                    <h4>${spot.name}</h4>
                    <div class="spot-meta">${spot.meta}</div>
                    <div class="spot-desc">${spot.desc}</div>
                </div>
            </div>
        `;
    });
    
    // 生成日程HTML
    let daysHtml = '';
    route.days.forEach(day => {
        daysHtml += `
            <div class="day-card">
                <div class="day-title">${day.title}</div>
                <div class="day-content">${day.content}</div>
            </div>
        `;
    });
    
    // 生成预算HTML
    let budgetHtml = '';
    route.budget.forEach(item => {
        const isTotal = item.total ? 'style="background:#fff8f0;font-weight:bold;color:#8B0000;"' : '';
        budgetHtml += `
            <tr ${isTotal}>
                <td>${item.item}</td>
                <td>${item.cost}</td>
            </tr>
        `;
    });
    
    // 生成提示HTML
    let tipsHtml = '';
    route.tips.forEach(tip => {
        tipsHtml += `<li>${tip}</li>`;
    });
    
    // 组装完整页面
    container.innerHTML = `
        <div class="page">
            <div class="route-header">
                <div class="route-name">${route.name}</div>
                <div class="route-meta">
                    <span class="route-tag">主题：${route.theme}</span>
                    <span class="route-tag">路线：${route.cities}</span>
                    <span class="route-tag">交通：${route.transport}</span>
                    <span class="route-tag">难度：${route.difficulty}</span>
                </div>
            </div>
            
            <div class="transport-box">
                <div class="transport-title">🚄 上海出发交通方案</div>
                <div class="transport-detail">${route.transportDetail}</div>
            </div>
            
            <h3 style="color:#8B0000;border-left:4px solid #DAA520;padding-left:10px;margin:15px 0;">📅 每日行程规划</h3>
            ${daysHtml}
        </div>
        
        <div class="page">
            <h3 style="color:#8B0000;border-left:4px solid #DAA520;padding-left:10px;margin:15px 0;">📍 核心景点详解</h3>
            <div class="spots-grid">
                ${spotsHtml}
            </div>
            
            <h3 style="color:#8B0000;border-left:4px solid #DAA520;padding-left:10px;margin:20px 0 10px 0;">💰 预算明细</h3>
            <table class="budget-table">
                <tr><th>项目</th><th>费用（人均）</th></tr>
                ${budgetHtml}
            </table>
            
            <div class="tips-box">
                <div class="tips-title">⚠️ 实用贴士</div>
                <ul>${tipsHtml}</ul>
            </div>
            
            <div style="background:#f0f8ff;border:1px solid #4682B4;padding:12px;border-radius:8px;margin-top:15px;font-size:13px;">
                <strong>💡 保存建议：</strong>点击顶部"保存为PDF"按钮，或按Ctrl+P打印。建议打印后随身携带，随时查阅。
            </div>
        </div>
    `;
    
    // 滚动到内容区
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// 页面加载时默认生成2天路线
window.onload = function() {
    generateRoute(2);
};
